# Release workflow: build parsel_text and publish it to PyPI on a `v*` tag.
#
# Publishing uses PyPI Trusted Publishing (OIDC) -- no API token / secret needed.
# One-time setup required for it to work:
#   1. PyPI -> project `parsel_text` -> Settings -> Publishing -> "Add a pending/
#      trusted publisher (GitHub)":
#        Owner:        carlosplanchon
#        Repository:   parsel_text
#        Workflow:     release.yml
#        Environment:  pypi
#   2. GitHub -> repo Settings -> Environments -> create environment `pypi`
#      (optionally add protection rules / required reviewers).
#
# Cutting a release:
#   - bump `version` in pyproject.toml (e.g. 1.3)
#   - git tag v1.3 && git push origin v1.3   (tag must match the pyproject version)

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ---- Gate: tag/version consistency + tests must pass before we publish ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Check tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(uv run --no-project python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG  pyproject=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: uv run pytest -q

  # ---- Build sdist + wheel ----
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Build sdist and wheel
        run: uv build

      - name: Check artifacts
        run: uv run --no-project --with twine twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ---- Publish to PyPI via Trusted Publishing (OIDC) ----
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC / trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
