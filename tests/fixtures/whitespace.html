<h2>Ejemplo de código</h2>
<pre><code>def fibonacci(n):
    if n &lt; 2:
        return n
    return fibonacci(n - 1) + fibonacci(n - 2)
</code></pre>

<h2>Poema</h2>
<pre>
  Verso uno con sangría
    Verso dos más adentro
  Verso tres de vuelta
</pre>

<p>Un    párrafo    normal    con    muchos    espacios.</p>
